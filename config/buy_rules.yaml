      - drawdown_pct: -5
        shares: 1
      - drawdown_pct: -8
        shares: 1
      - drawdown_pct: -12
        shares: 1

  URA:
    tranches:
      - drawdown_pct: -6
        shares: 2
      - drawdown_pct: -10
        shares: 2
      - drawdown_pct: -15
        shares: 2

  PLTR:
    tranches:
      - drawdown_pct: -10
        shares: 1
      - drawdown_pct: -15
        shares: 2
      - drawdown_pct: -22
        shares: 2

  MSFT:
    tranches:
      - drawdown_pct: -6
        shares: 1
      - drawdown_pct: -10
        shares: 2
