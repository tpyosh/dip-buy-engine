base_price_method:
  type: "mean_close"
  lookback_trading_days: 20

limit_order_rules:
  CIBR:
    tranches:
      - drawdown_pct: -5
        shares: 1
      - drawdown_pct: -8
        shares: 1
      - drawdown_pct: -12
        shares: 1

  URA:
    tranches:
      - drawdown_pct: -6
        shares: 2
      - drawdown_pct: -10
        shares: 2
      - drawdown_pct: -15
        shares: 2

  PLTR:
    tranches:
      - drawdown_pct: -10
        shares: 1
      - drawdown_pct: -15
        shares: 2
      - drawdown_pct: -22
        shares: 2

  MSFT:
    tranches:
      - drawdown_pct: -6
        shares: 1
      - drawdown_pct: -10
        shares: 2
      - drawdown_pct: -18
        shares: 2

sox_buy_judgement:
  proxy_symbol: "SMH"
  method: "drawdown_from_recent_high_close"
  lookback_trading_days: 63
  near_boundary_threshold_pct: 1
  buy_zone_min_pct: -10
  buy_zone_max_pct: -5
  deprioritize_when_related_bucket_over_target: true
  priority_lowered_note: "related_bucket_over_target"
  monthly_buy_budget_jpy:
    min: 100000
    max: 200000

core_budget_policy:
  base_monthly_buy_amount_jpy: 100000
  monthly_core_buy_budget_min_jpy: 100000
  monthly_core_buy_budget_max_jpy: 300000
  budget_tiers:
    standard:
      budget_jpy: 100000
    aggressive:
      budget_jpy: 300000
  override_conditions:
    core_shortfall_pct_gte: 0.15
    cash_excess_pct_gte: 0.15
    budget_tier: "aggressive"
    reason_code: "core_underweight_and_cash_overweight"

candidate_policy:
  bucket_over_target:
    default_behavior: "deep_only"
    deep_drawdown_threshold_pct: -15
    skip_note: "default_skip_due_to_bucket_over_target"
    deep_only_note: "default_deep_only_due_to_bucket_over_target"
    allow_note: "default_allow_deep_drawdown_even_if_bucket_over_target"
  high_volatility:
    symbols:
      - "PLTR"
    shallow_drawdown_threshold_pct: -12
    suppress_shallow_candidates: true
    suppressed_reason_code: "high_volatility_shallow_suppressed"
    suppressed_reason_text: "High-volatility names default to deeper pullbacks before adding."
  reduction_reason_templates:
    rule_based:
      - "ルール上の判断: bucket_over_target のため浅い段を見送る"
      - "ルール上の判断: 高ボラ銘柄は深い押し目のみ許容する"
    discretionary:
      - "今月の裁量判断: core 補強を優先するため段数を減らす"
      - "今月の裁量判断: 今月のイベントや資金配分を踏まえて段数を調整する"

validation:
  suppress_reason_text:
    limit_above_current: "Calculated limit price is not below the current price."
    missing_current_price: "Current price is unavailable."
    invalid_base_price: "Base price is unavailable or invalid."
    non_positive_shares: "Configured shares must be positive."
    non_positive_est_cost: "Estimated cost must be positive."
    calculation_unavailable: "Candidate calculation could not be completed."
    high_volatility_shallow_suppressed: "High-volatility names default to deeper pullbacks before adding."

execution:
  order_expiration: "month_end"
  round_price:
    usd_decimals: 2
    jpy_decimals: 0
